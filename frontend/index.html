<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI XSMN - Hệ Thống Giám Sát Xu Hướng MLOps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

    <style>
        #main-app-wrapper { display: block !important; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

    <div id="main-app-wrapper">
        
        <header class="app-header">
            <div class="header-left">
                <button id="btn-toggle-sidebar" class="toggle-sidebar-btn" title="Menu">Menu</button>
                <h1 class="app-title">AI XSMN</h1>
            </div>
            <div class="app-meta">
                <span class="pulse-indicator"></span>
                <span id="lbl-time">Đang cập nhật...</span>
            </div>
        </header>

        <div id="app-container" class="app-layout">
            
            <aside class="app-sidebar">
                <div class="sidebar-scroll-wrapper">
                    <div class="section-box">
                        <h3 class="section-title text-success">
                            <span>Số Vàng AI</span>
                            <span id="lbl-pred-date" style="font-size: 0.75rem; color: var(--text-muted)"></span>
                        </h3>
                        <div id="prediction-list" class="sidebar-list">
                            <div class="chart-tip">Đang đồng bộ Số Vàng...</div>
                        </div>
                    </div>

                    <div class="section-box">
                        <h3 class="section-title text-danger">
                            <span>Đối Chiếu Kỳ Trước</span>
                        </h3>
                        <div id="backtest-list" class="sidebar-list">
                            <div class="chart-tip">Đang nạp đối chiếu...</div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="app-main">
                
                <div class="chart-box">
                    <div class="chart-header">
                        <h3 class="chart-title">Xu Hướng Giải 8 (00-99 Cố Định)</h3>
                        <div class="toolbar-panel">
                            <div class="filter-bar">
                                <select id="cbo-timeframe">
                                    <option value="recent" selected>30 Kỳ Gần Nhất</option>
                                    <option value="2years">2 Năm Gần Nhất</option>
                                    <option value="all">Toàn Bộ Lịch Sử</option>
                                </select>
                            </div>
                            <div class="action-buttons">
                                <button id="btn-select-all" class="btn">Bật Hết</button>
                                <button id="btn-deselect-all" class="btn">Tắt Hết</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="historyLineChart"></canvas>
                    </div>

                    <div class="chart-nav-controls">
                        <div class="nav-group">
                            <button id="btn-zoom-in" class="btn-nav">+</button>
                            <button id="btn-zoom-out" class="btn-nav">-</button>
                            <button id="btn-zoom-reset" class="btn-nav" style="width: auto; padding: 0 0.5rem; font-size: 0.75rem;">Mặc Định</button>
                        </div>
                        <div class="nav-group">
                            <button id="btn-pan-left" class="btn-nav">◀</button>
                            <button id="btn-pan-right" class="btn-nav">▶</button>
                        </div>
                    </div>
                </div>

                <div class="history-list-box">
                    <div class="chart-header">
                        <h3 class="chart-title">Danh Sách Tra Cứu</h3>
                    </div>
                    <div class="table-controls">
                        <div class="table-search-panel">
                            <input type="text" id="table-search-input" class="input-search" placeholder="Tìm đài, con số...">
                            <select id="table-filter-year" class="input-search" style="max-width: 120px;">
                                <option value="all">Tất Cả</option>
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                                <option value="2024">2024</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="datatable">
                            <thead>
                                <tr>
                                    <th>Ngày</th>
                                    <th>Đài</th>
                                    <th>G.8</th>
                                    <th>Đầu/Đuôi</th>
                                    <th>Xu Hướng</th>
                                </tr>
                            </thead>
                            <tbody id="historical-table-rows">
                                <tr><td colspan="5" style="text-align: center; padding: 1rem;">Đang đồng bộ dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="table-pagination-panel">
                        <span id="table-entries-info">Đang tải...</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="btn-table-prev" class="btn">◀</button>
                            <button id="btn-table-next" class="btn">▶</button>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="js/dashboard_data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
