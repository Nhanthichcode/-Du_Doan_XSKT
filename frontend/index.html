<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI XSMN - Hệ Thống Giám Sát Xu Hướng MLOps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

    <style>
        #main-app-wrapper { display: block !important; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* --- UI/UX Bộ lọc kiểu E-commerce bổ sung --- */
        .ecommerce-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .w-100 { width: 100%; }
        .ml-auto { margin-left: auto; }
        .flex-2 { flex: 2; min-width: 100px; }

        .ecommerce-filters select {
            background-color: var(--bg-app);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            flex: 1;
            min-width: 70px;
            cursor: pointer;
            transition: border 0.3s;
        }
        .ecommerce-filters select:hover { border-color: var(--primary); }

        /* --- Tối ưu Nút biểu đồ --- */
        .btn-nav.btn-lg {
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            background-color: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-nav.btn-lg:active {
            background-color: var(--primary);
            color: #fff;
            transform: scale(0.95);
        }
        .chart-nav-controls { padding: 10px; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <div id="main-app-wrapper">
        
        <header class="app-header">
            <div class="header-left">
                <button id="btn-toggle-sidebar" class="toggle-sidebar-btn" title="Menu">Menu</button>
                <h1 class="app-title">AI XSMN</h1>
            </div>
            <div class="app-meta">
                <span class="pulse-indicator"></span>
                <span id="lbl-time">Đang cập nhật...</span>
            </div>
        </header>

        <div id="app-container" class="app-layout">
            
            <aside class="app-sidebar">
                <div class="sidebar-scroll-wrapper">
                    <div class="section-box">
                        <h3 class="section-title text-success">
                            <span>Số Vàng AI</span>
                            <span id="lbl-pred-date" style="font-size: 0.75rem; color: var(--text-muted)"></span>
                        </h3>
                        <div id="prediction-list" class="sidebar-list">
                            <div class="chart-tip">Đang đồng bộ Số Vàng...</div>
                        </div>
                    </div>

                    <div class="section-box">
                        <h3 class="section-title text-danger">
                            <span>Đối Chiếu Kỳ Trước</span>
                        </h3>
                        <div class="ecommerce-filters">
                            <select id="filter-bt-dai"><option value="all">Tất cả đài</option></select>
                            <select id="filter-bt-month">
                                <option value="all">Tháng</option>
                                <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option><option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option><option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option><option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                            </select>
                            <select id="filter-bt-year">
                                <option value="all">Năm</option>
                                <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
                            </select>
                            <select id="filter-bt-status">
                                <option value="all">Trạng thái</option>
                                <option value="win">Đúng (Trúng)</option>
                                <option value="loss">Sai (Trượt)</option>
                            </select>
                        </div>
                        <div id="backtest-list" class="sidebar-list">
                            <div class="chart-tip">Đang nạp đối chiếu...</div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="app-main">
                
                <div class="chart-box">
                    <div class="chart-header" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                        <h3 class="chart-title">Xu Hướng Giải 8 (00-99 Cố Định)</h3>
                        <div class="toolbar-panel w-100">
                            <div class="ecommerce-filters w-100">
                                <select id="cbo-timeframe">
                                    <option value="recent" selected>30 Kỳ</option>
                                    <option value="2years">2 Năm</option>
                                    <option value="all">Toàn Bộ</option>
                                </select>
                                <select id="filter-chart-dai"><option value="all">Tất cả đài</option></select>
                                <select id="filter-chart-month">
                                    <option value="all">Tháng</option>
                                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                                <select id="filter-chart-year">
                                    <option value="all">Năm</option>
                                    <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
                                </select>
                                <div class="action-buttons ml-auto">
                                    <button id="btn-select-all" class="btn">Bật Hết</button>
                                    <button id="btn-deselect-all" class="btn">Tắt Hết</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="historyLineChart"></canvas>
                    </div>

                    <div class="chart-nav-controls">
                        <div class="nav-group">
                            <button id="btn-zoom-in" class="btn-nav btn-lg" title="Phóng to">➕ Zoom</button>
                            <button id="btn-zoom-out" class="btn-nav btn-lg" title="Thu nhỏ">➖ Zoom</button>
                            <button id="btn-zoom-reset" class="btn-nav btn-lg">🔄 Reset</button>
                        </div>
                        <div class="nav-group">
                            <button id="btn-pan-left" class="btn-nav btn-lg">◀ Trái</button>
                            <button id="btn-pan-right" class="btn-nav btn-lg">Phải ▶</button>
                        </div>
                    </div>
                </div>

                <div class="history-list-box">
                    <div class="chart-header">
                        <h3 class="chart-title">Danh Sách Tra Cứu</h3>
                    </div>
                    <div class="table-controls">
                        <div class="table-search-panel ecommerce-filters w-100">
                            <input type="text" id="table-search-input" class="input-search flex-2" placeholder="Tìm số...">
                            <select id="filter-tbl-dai" class="input-search"><option value="all">Tất cả đài</option></select>
                            <select id="filter-tbl-month" class="input-search">
                                <option value="all">Tháng</option>
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                            </select>
                            <select id="filter-tbl-year" class="input-search">
                                <option value="all">Năm</option>
                                <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="datatable">
                            <thead>
                                <tr>
                                    <th>Ngày</th>
                                    <th>Đài</th>
                                    <th>G.8</th>
                                    <th>Đầu/Đuôi</th>
                                    <th>Xu Hướng</th>
                                </tr>
                            </thead>
                            <tbody id="historical-table-rows">
                                <tr><td colspan="5" style="text-align: center; padding: 1rem;">Đang đồng bộ dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="table-pagination-panel">
                        <span id="table-entries-info">Đang tải...</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="btn-table-prev" class="btn">◀</button>
                            <button id="btn-table-next" class="btn">▶</button>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="js/dashboard_data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
