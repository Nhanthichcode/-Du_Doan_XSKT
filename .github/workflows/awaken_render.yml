name: Watchdog - Danh thuc Render moi ngay

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest

    steps:
      - name: Gui tin hieu Ping toi Render
        run: |
          curl -X GET "https://du-doan-xskt.onrender.com/ping" \
          -H "X-Secret-Key: ${{ secrets.MLOPS_SECRET_KEY }}"
